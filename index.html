<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Premium Kanban Board</title>
    <meta name="description" content="A premium Kanban board for task management with drag and drop support.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-layer-group"></i>
                <h1>TaskMaster</h1>
            </div>
            <div class="actions">
                <button id="add-task-btn" class="primary-btn"><i class="fa-solid fa-plus"></i> New Task</button>
            </div>
        </header>

        <main class="board">
            <!-- To Do Column -->
            <div class="column" data-status="todo">
                <div class="column-header">
                    <h2><span class="dot todo-dot"></span>To Do</h2>
                    <span class="task-count" id="todo-count">0</span>
                </div>
                <div class="task-list" id="todo-list">
                    <!-- Tasks will be dynamically added here -->
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="column" data-status="in-progress">
                <div class="column-header">
                    <h2><span class="dot progress-dot"></span>In Progress</h2>
                    <span class="task-count" id="progress-count">0</span>
                </div>
                <div class="task-list" id="progress-list">
                    <!-- Tasks will be dynamically added here -->
                </div>
            </div>

            <!-- Done Column -->
            <div class="column" data-status="done">
                <div class="column-header">
                    <h2><span class="dot done-dot"></span>Done</h2>
                    <span class="task-count" id="done-count">0</span>
                </div>
                <div class="task-list" id="done-list">
                    <!-- Tasks will be dynamically added here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for New Task -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Task</h2>
                <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="e.g., Design homepage UI">
                </div>
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Add some details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button type="submit" class="primary-btn submit-btn">Create Task</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
